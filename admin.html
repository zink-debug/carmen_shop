<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <style>
    body { font-family: monospace; background: #1A1714; color: #FAF8F4; padding: 1rem; max-width: 1200px; margin: auto; }
    .box { background: #2a2522; padding: 1rem; margin-bottom: 1rem; border: 1px solid #4A4540; }
    input, select, button { background: #1A1714; color: white; border: 1px solid #4A4540; padding: 0.5rem; margin: 0.2rem; }
    button { cursor: pointer; background: #4A4540; }
    button:hover { background: #888078; }
    .flex { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .danger { background: #b03020; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .order-card { border-left: 5px solid #f1c40f; }
    .order-card.completed { border-left-color: #4CAF50; opacity: 0.6; }
  </small></style>
</head>
<body>

<div id="auth-screen" style="text-align: center; margin-top: 20vh;">
  <h2>Admin Access</h2>
  <input type="password" id="admin-pass" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<div id="main-interface" style="display:none">
  <div class="grid">
    <div>
      <div class="flex" style="justify-content: space-between;">
        <h2>Live Orders</h2>
        <span id="poll-status" style="color: #4CAF50;">● Live</span>
      </div>
      <div id="orders-container">Loading...</div>
    </div>

    <div>
      <div class="flex" style="justify-content: space-between;">
        <h2>Menu Editor</h2>
        <button onclick="saveMenu()" style="background: #4CAF50; font-weight:bold;">SAVE TO LIVE SITE</button>
      </div>
      <div id="categories-container"></div>
      <button onclick="addCategory()">+ New Category</button>
    </div>
  </div>
</div>

<script>
  let password = '';
  let menu = { categories: [] };

  async function login() {
    password = document.getElementById('admin-pass').value;
    const res = await fetch('/api/menu');
    if (res.ok) {
      menu = await res.json();
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-interface').style.display = 'block';
      renderMenu();
      fetchOrders();
      setInterval(fetchOrders, 5000);
    } else { alert("Wrong password"); }
  }

  async function fetchOrders() {
    const res = await fetch('/api/orders', { headers: { 'Authorization': password } });
    if (res.ok) {
      const orders = await res.json();
      const container = document.getElementById('orders-container');
      container.innerHTML = orders.length ? '' : 'No orders.';
      orders.forEach(o => {
        const div = document.createElement('div');
        div.className = `box order-card ${o.status}`;
        div.innerHTML = `
          <div class="flex" style="justify-content: space-between;"><strong>${o.name}</strong> <small>${o.room}</small></div>
          <p>${o.quantity}x ${o.drink} ($${o.total.toFixed(2)})</p>
          <small style="color:#aaa">${o.options}</small>
          ${o.notes ? `<p style="color:#d4af37">Note: ${o.notes}</p>` : ''}
          <div style="margin-top:0.5rem">
            ${o.status === 'pending' ? `<button onclick="updateStatus(${o.id}, 'completed')">Mark Done</button>` : '✓ Done'}
          </div>
        `;
        container.appendChild(div);
      });
    }
  }

  async function updateStatus(id, status) {
    await fetch('/api/order-status', {
      method: 'POST',
      headers: { 'Authorization': password, 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status })
    });
    fetchOrders();
  }

  function renderMenu() {
    const container = document.getElementById('categories-container');
    container.innerHTML = '';
    menu.categories.forEach((cat, cIdx) => {
      let html = `<div class="box">
        <div class="flex">
          <input type="text" value="${cat.name}" onchange="menu.categories[${cIdx}].name=this.value">
          <button class="danger" onclick="menu.categories.splice(${cIdx},1);renderMenu()">Delete</button>
        </div>
        <div style="margin-left:1rem; border-left:1px solid #444; padding-left:0.5rem;">
          <h4>Drinks</h4>`;
      cat.drinks.forEach((d, dIdx) => {
        html += `<div class="flex">
          <input type="text" value="${d.name}" onchange="menu.categories[${cIdx}].drinks[${dIdx}].name=this.value">
          <input type="number" step="0.1" value="${d.price}" onchange="menu.categories[${cIdx}].drinks[${dIdx}].price=parseFloat(this.value)" style="width:60px">
          <button onclick="menu.categories[${cIdx}].drinks.splice(${dIdx},1);renderMenu()">x</button>
        </div>`;
      });
      html += `<button onclick="menu.categories[${cIdx}].drinks.push({id:''+Math.random(),name:'New',price:0});renderMenu()">+ Drink</button>
          <h4 style="margin-top:1rem">Options (Sizes/Syrups)</h4>`;
      
      if(!cat.optionGroups) cat.optionGroups = [];
      cat.optionGroups.forEach((og, ogIdx) => {
        html += `<div style="background:#1A1714; padding:5px; margin-bottom:5px;">
          <input type="text" value="${og.name}" onchange="menu.categories[${cIdx}].optionGroups[${ogIdx}].name=this.value" placeholder="Group Name">
          <button onclick="menu.categories[${cIdx}].optionGroups.splice(${ogIdx},1);renderMenu()">x</button>
        </div>`;
      });
      html += `<button onclick="menu.categories[${cIdx}].optionGroups.push({id:''+Math.random(),name:'Size',type:'radio',choices:[]});renderMenu()">+ Option Group</button>
        </div></div>`;
      container.innerHTML += html;
    });
  }

  function addCategory() { menu.categories.push({ id: ''+Math.random(), name: "New Category", drinks: [], optionGroups: [] }); renderMenu(); }

  async function saveMenu() {
    const res = await fetch('/api/menu', {
      method: 'POST',
      headers: { 'Authorization': password, 'Content-Type': 'application/json' },
      body: JSON.stringify(menu)
    });
    if (res.ok) alert("Menu Updated!");
  }
</script>
</body>
</html>
