<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soaring Hot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF8F4;
      --white: #FFFFFF;
      --ink: #1A1714;
      --ink-mid: #4A4540;
      --ink-muted: #888078;
      --ink-faint: #C8C2BB;
      --accent: #2C1F14;
      --accent-hover: #1A1108;
      --border: rgba(26,23,20,0.10);
      --border-mid: rgba(26,23,20,0.18);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 1.6rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--cream);
      z-index: 50;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }
    .wordmark em { font-style: italic; color: var(--ink-muted); }

    nav { display: flex; border: 1px solid var(--border-mid); }
    .tab {
      padding: 0.42rem 1rem;
      font-size: 0.76rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      border: none;
      border-right: 1px solid var(--border-mid);
      color: var(--ink-muted);
      font-family: inherit;
    }
    .tab:last-child { border-right: none; }
    .tab.active { background: var(--accent); color: white; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      min-height: calc(100vh - 65px);
    }

    .form-panel { padding: 2.5rem; border-right: 1px solid var(--border); }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); }
    input, textarea {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border-mid);
      background: var(--white);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ── Dynamic Menu Styling ── */
    .opt-group { margin-bottom: 2rem; }
    .opt-group-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.8rem; }
    .opt-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .opt-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.87rem;
      cursor: pointer;
      color: var(--ink-mid);
    }

    .price-hint { font-size: 0.7rem; color: var(--ink-faint); margin-left: auto; }

    /* ── Summary ── */
    .summary-panel { padding: 2rem 1.75rem; position: sticky; top: 65px; height: calc(100vh - 65px); display: flex; flex-direction: column; }
    .summary-drink { font-family: 'DM Serif Display', serif; font-size: 1.25rem; margin-bottom: 1rem; }
    .summary-lines { font-size: 0.8rem; color: var(--ink-muted); line-height: 1.6; flex-grow: 1; }
    
    .price-block { border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
    .total-row { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 500; margin-top: 0.5rem; }

    .submit-btn {
      padding: 0.875rem;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
    }

    /* ── Mobile ── */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      .form-panel { padding: 1.5rem 1.25rem; border-right: none; }
      .fields-grid { grid-template-columns: 1fr; }
      header { padding: 1rem; flex-direction: column; gap: 1rem; }
      .summary-panel { position: static; height: auto; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Soaring <em>Hot</em></div>
  <nav id="nav-tabs"></nav>
</header>

<div class="layout">
  <div class="form-panel">
    <div class="fields-grid">
      <div class="field"><div class="field-label">Name *</div><input type="text" id="cust-name"></div>
      <div class="field"><div class="field-label">Email *</div><input type="email" id="cust-email"></div>
      <div class="field"><div class="field-label">Room *</div><input type="text" id="cust-room"></div>
      <div class="field"><div class="field-label">Quantity</div><input type="number" id="cust-qty" value="1" min="1"></div>
      <div class="field" style="grid-column: span 1"><div class="field-label">Notes</div><textarea id="cust-notes" rows="2"></textarea></div>
    </div>
    <hr>
    <div id="dynamic-menu">Loading menu...</div>
  </div>

  <div class="summary-panel">
    <div class="field-label" style="margin-bottom:1rem">Order Summary</div>
    <div class="summary-drink" id="summary-drink">Select your item</div>
    <div class="summary-lines" id="summary-content"></div>
    
    <div class="price-block">
      <div class="total-row">
        <span>Total</span>
        <span>$<span id="summary-total">0.00</span></span>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Place Order</button>
  </div>
</div>

<script>
  let menuData = null;
  let activeCategoryIndex = 0;

  async function loadMenu() {
    try {
      const res = await fetch('/api/menu');
      menuData = await res.json();
      renderTabs();
      renderCategory();
    } catch(e) { document.getElementById('dynamic-menu').innerText = "Failed to load menu."; }
  }

  function renderTabs() {
    const nav = document.getElementById('nav-tabs');
    nav.innerHTML = menuData.categories.map((c, i) => 
      `<button class="tab ${i === activeCategoryIndex ? 'active' : ''}" onclick="switchTab(${i})">${c.name}</button>`
    ).join('');
  }

  function switchTab(index) {
    activeCategoryIndex = index;
    renderTabs();
    renderCategory();
  }

  function renderCategory() {
    const cat = menuData.categories[activeCategoryIndex];
    if (!cat) return;

    let html = `<div class="opt-group"><div class="opt-group-label">Select Drink</div><div class="opt-list">`;
    cat.drinks.forEach(d => {
      html += `<label class="opt-label"><input type="radio" name="drink" value="${d.id}" data-price="${d.price}" data-name="${d.name}" onchange="updateTotal()"> ${d.name} <span class="price-hint">$${d.price.toFixed(2)}</span></label>`;
    });
    html += `</div></div>`;

    cat.optionGroups.forEach(og => {
      html += `<div class="opt-group"><div class="opt-group-label">${og.name}</div><div class="opt-list">`;
      og.choices.forEach(c => {
        html += `<label class="opt-label"><input type="${og.type}" name="${og.id}" value="${c.id}" data-price="${c.price}" data-name="${c.name}" onchange="updateTotal()"> ${c.name} ${c.price > 0 ? `<span class="price-hint">+$${c.price.toFixed(2)}</span>` : ''}</label>`;
      });
      html += `</div></div>`;
    });

    document.getElementById('dynamic-menu').innerHTML = html;
    updateTotal();
  }

  function updateTotal() {
    let subtotal = 0;
    let summaryHtml = '';
    
    const drinkEl = document.querySelector('input[name="drink"]:checked');
    if (drinkEl) {
      document.getElementById('summary-drink').innerText = drinkEl.dataset.name;
      subtotal += parseFloat(drinkEl.dataset.price);
    } else {
      document.getElementById('summary-drink').innerText = "Select a drink";
    }

    const cat = menuData.categories[activeCategoryIndex];
    cat.optionGroups.forEach(og => {
      document.querySelectorAll(`input[name="${og.id}"]:checked`).forEach(el => {
        subtotal += parseFloat(el.dataset.price);
        summaryHtml += `<div>+ ${el.dataset.name}</div>`;
      });
    });

    const qty = Math.max(1, parseInt(document.getElementById('cust-qty').value) || 1);
    const total = subtotal * qty;

    document.getElementById('summary-content').innerHTML = summaryHtml;
    document.getElementById('summary-total').textContent = total.toFixed(2);
  }

  document.getElementById('cust-qty').addEventListener('input', updateTotal);

  async function submitOrder() {
    const drinkEl = document.querySelector('input[name="drink"]:checked');
    if (!drinkEl) return alert('Please select a drink');
    
    const cat = menuData.categories[activeCategoryIndex];
    const drinkName = drinkEl.dataset.name;
    const selectedOptions = [];

    cat.optionGroups.forEach(og => {
      document.querySelectorAll(`input[name="${og.id}"]:checked`).forEach(el => {
        selectedOptions.push(el.dataset.name);
      });
    });

    const payload = {
      name: document.getElementById('cust-name').value,
      email: document.getElementById('cust-email').value,
      room: document.getElementById('cust-room').value,
      notes: document.getElementById('cust-notes').value,
      category: cat.name,
      drink: drinkName,
      options: selectedOptions,
      quantity: Math.max(1, parseInt(document.getElementById('cust-qty').value) || 1),
      total: parseFloat(document.getElementById('summary-total').textContent)
    };

    if (!payload.name || !payload.email || !payload.room) return alert('Please fill in Name, Email, and Room.');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "Processing...";

    try {
      const res = await fetch('/api/order', { method: 'POST', body: JSON.stringify(payload) });
      if (res.ok) {
        alert('Order placed! Thank you.');
        window.location.reload();
      } else { alert('Error placing order.'); }
    } catch(e) { alert('Network error.'); }
    finally { btn.disabled = false; btn.innerText = "Place Order"; }
  }

  loadMenu();
</script>
</body>
</html>
