<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Cart Emporium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF8F4;
      --white: #FFFFFF;
      --ink: #1A1714;
      --ink-mid: #4A4540;
      --ink-muted: #888078;
      --ink-faint: #C8C2BB;
      --accent: #2C1F14;
      --accent-hover: #1A1108;
      --border: rgba(26,23,20,0.10);
      --border-mid: rgba(26,23,20,0.18);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      padding: 1.6rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--cream);
      z-index: 50;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }

    .wordmark em { font-style: italic; color: var(--ink-muted); }

    nav { display: flex; border: 1px solid var(--border-mid); }

    .tab {
      padding: 0.42rem 1rem;
      font-size: 0.76rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      border: none;
      border-right: 1px solid var(--border-mid);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink-muted);
      transition: background 0.12s, color 0.12s;
    }

    .tab:last-child { border-right: none; }
    .tab:hover { background: rgba(26,23,20,0.04); color: var(--ink); }
    .tab.active { background: var(--accent); color: white; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      min-height: calc(100vh - 65px);
    }

    .form-panel {
      padding: 2.5rem;
      border-right: 1px solid var(--border);
    }

    .page { display: none; }
    .page.active { display: block; }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.03em;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field.span2 { grid-column: span 2; }

    .field-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .field-input,
    .field-textarea {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border-mid);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      border-radius: 0;
      transition: border-color 0.12s;
      width: 100%;
    }

    .field-input:focus,
    .field-textarea:focus { border-color: var(--ink-mid); }
    .field-input::placeholder,
    .field-textarea::placeholder { color: var(--ink-faint); }

    .field-textarea { resize: vertical; min-height: 80px; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1.5rem 2rem;
      margin-bottom: 1.5rem;
    }

    .option-group-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.6rem;
    }

    .option-list { display: flex; flex-direction: column; gap: 0.45rem; }

    .opt { display: none; }

    .opt-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.87rem;
      cursor: pointer;
      user-select: none;
      color: var(--ink-mid);
      transition: color 0.1s;
    }

    .opt-label:hover { color: var(--ink); }

    .opt-box {
      width: 15px;
      height: 15px;
      border: 1px solid var(--border-mid);
      background: var(--white);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, border-color 0.1s;
    }

    .opt-box.round { border-radius: 50%; }

    .opt:checked + .opt-label .opt-box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .opt:checked + .opt-label .opt-box::after {
      content: '';
      display: block;
      background: white;
    }

    input[type="checkbox"].opt:checked + .opt-label .opt-box::after {
      width: 8px;
      height: 8px;
    }

    input[type="radio"].opt:checked + .opt-label .opt-box::after {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .opt:checked + .opt-label { color: var(--ink); font-weight: 500; }

    .price-hint {
      font-size: 0.7rem;
      color: var(--ink-faint);
      margin-left: auto;
    }

    .summary-panel {
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 65px;
      height: calc(100vh - 65px);
      overflow-y: auto;
    }

    .summary-inner {
      flex: 1;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .summary-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .summary-drink {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink);
      min-height: 1.6rem;
    }

    .summary-lines {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--ink-muted);
    }

    .summary-line { display: flex; justify-content: space-between; }

    .price-block {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--ink-muted);
    }

    .price-total {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 500;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .submit-area {
      padding: 1.25rem 1.75rem 1.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .submit-btn {
      padding: 0.875rem;
      background: var(--accent);
      color: white;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.12s;
      width: 100%;
    }

    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--cream);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.active { display: flex; }

    .confirm-box {
      max-width: 420px;
      width: calc(100% - 3rem);
      padding: 3rem 2.5rem;
      border: 1px solid var(--border-mid);
      background: var(--white);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .confirm-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .confirm-detail {
      font-size: 0.87rem;
      color: var(--ink-mid);
      line-height: 1.7;
      white-space: pre-line;
    }

    .confirm-total {
      font-size: 1rem;
      font-weight: 500;
      margin-top: 0.25rem;
    }

    .confirm-queue {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .new-order-btn {
      margin-top: 1.25rem;
      padding: 0.65rem 1.5rem;
      background: none;
      border: 1px solid var(--border-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--ink-mid);
      letter-spacing: 0.05em;
      align-self: flex-start;
      transition: background 0.12s;
    }

    .new-order-btn:hover { background: rgba(26,23,20,0.05); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 0.65rem 1.25rem;
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999;
    }

    .toast.show { opacity: 1; }

    .field-input.error,
    .field-textarea.error { border-color: #b03020; }

    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      .summary-panel { position: static; height: auto; border-top: 1px solid var(--border); }
      header { padding: 1.2rem 1.25rem; }
      .form-panel { padding: 1.5rem 1.25rem; }
      .fields-grid { grid-template-columns: 1fr; }
      .field.span2 { grid-column: span 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Coffee Cart <em>Emporium</em></div>
  <nav>
    <button class="tab active" onclick="switchPage('coffee', this)">Coffee</button>
    <button class="tab" onclick="switchPage('tea', this)">Tea</button>
    <button class="tab" onclick="switchPage('juice', this)">Juice</button>
  </nav>
</header>

<div class="layout">

  <div class="form-panel">

    <div class="page active" id="page-coffee">
      <div class="page-title">Coffee</div>

      <div class="fields-grid">
        <div class="field">
          <div class="field-label">Name <span style="color:#b03020">*</span></div>
          <input class="field-input" id="coffee-name" type="text" placeholder="">
        </div>
        <div class="field">
          <div class="field-label">Email Address <span style="color:#b03020">*</span></div>
          <input class="field-input" id="coffee-email" type="email" placeholder="">
        </div>
        <div class="field">
          <div class="field-label">Room Number or Area <span style="color:#b03020">*</span></div>
          <textarea class="field-textarea" id="coffee-room" rows="3"></textarea>
        </div>
        <div class="field">
          <div class="field-label">Additional Requests</div>
          <textarea class="field-textarea" id="coffee-notes" rows="3"></textarea>
        </div>
      </div>

      <hr class="divider">

      <div class="options-grid">

        <div>
          <div class="option-group-label">Cup Size <span style="color:#b03020">*</span></div>
          <div class="option-list">
            <input type="radio" name="coffee-size" id="cs-12" value="12 oz" class="opt">
            <label for="cs-12" class="opt-label"><span class="opt-box round"></span>12 oz</label>
            <input type="radio" name="coffee-size" id="cs-16" value="16 oz" class="opt">
            <label for="cs-16" class="opt-label"><span class="opt-box round"></span>16 oz<span class="price-hint">+$1.00</span></label>
            <input type="radio" name="coffee-size" id="cs-20" value="20 oz" class="opt">
            <label for="cs-20" class="opt-label"><span class="opt-box round"></span>20 oz<span class="price-hint">+$2.00
