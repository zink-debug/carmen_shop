<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Cart Emporium</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF8F4; --white: #FFFFFF; --ink: #1A1714; --ink-mid: #4A4540; --ink-muted: #888078; --ink-faint: #C8C2BB; --accent: #2C1F14; --border: rgba(26,23,20,0.18); }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); }
    header { padding: 1.6rem 2.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .wordmark { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
    nav { display: flex; border: 1px solid var(--border); }
    .tab { padding: 0.5rem 1rem; cursor: pointer; background: none; border: none; border-right: 1px solid var(--border); }
    .tab.active { background: var(--accent); color: white; }
    .layout { display: grid; grid-template-columns: 1fr 360px; min-height: calc(100vh - 65px); }
    .form-panel { padding: 2.5rem; border-right: 1px solid var(--border); }
    .summary-panel { padding: 2rem; display: flex; flex-direction: column; }
    .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    input[type="text"], input[type="email"], input[type="number"], textarea { width: 100%; padding: 0.6rem; border: 1px solid var(--border); }
    .opt-group { margin-bottom: 1.5rem; }
    .opt-group-label { font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem; text-transform: uppercase; color: var(--ink-muted); }
    .opt-label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; }
    .price-hint { margin-left: auto; color: var(--ink-faint); font-size: 0.8rem; }
    .submit-btn { padding: 1rem; background: var(--accent); color: white; border: none; width: 100%; cursor: pointer; margin-top: auto; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Coffee Cart <em>Emporium</em></div>
  <nav id="nav-tabs"></nav>
</header>

<div class="layout">
  <div class="form-panel">
    <div class="fields-grid">
      <div><label>Name</label><input type="text" id="cust-name"></div>
      <div><label>Email</label><input type="email" id="cust-email"></div>
      <div><label>Room</label><input type="text" id="cust-room"></div>
      <div><label>Quantity</label><input type="number" id="cust-qty" value="1" min="1"></div>
      <div style="grid-column: span 2"><label>Notes</label><textarea id="cust-notes"></textarea></div>
    </div>
    <hr>
    <div id="dynamic-menu">Loading menu...</div>
  </div>

  <div class="summary-panel">
    <h3 style="margin-bottom: 1rem">Order Summary</h3>
    <div id="summary-content">Select a drink to begin.</div>
    <div style="margin-top: 2rem; font-size: 1.2rem; font-weight: bold;">Total: $<span id="summary-total">0.00</span></div>
    <button class="submit-btn" onclick="submitOrder()">Place Order</button>
  </div>
</div>

<script>
  let menuData = null;
  let activeCategoryIndex = 0;

  async function loadMenu() {
    const res = await fetch('/api/menu');
    menuData = await res.json();
    renderTabs();
    renderCategory();
  }

  function renderTabs() {
    const nav = document.getElementById('nav-tabs');
    nav.innerHTML = menuData.categories.map((c, i) => 
      `<button class="tab ${i === activeCategoryIndex ? 'active' : ''}" onclick="switchTab(${i})">${c.name}</button>`
    ).join('');
  }

  function switchTab(index) {
    activeCategoryIndex = index;
    renderTabs();
    renderCategory();
  }

  function renderCategory() {
    const cat = menuData.categories[activeCategoryIndex];
    if (!cat) return;

    let html = `<div class="opt-group"><div class="opt-group-label">Select Drink</div>`;
    cat.drinks.forEach(d => {
      html += `<label class="opt-label"><input type="radio" name="drink" value="${d.id}" data-price="${d.price}" onchange="updateTotal()"> ${d.name} <span class="price-hint">$${d.price.toFixed(2)}</span></label>`;
    });
    html += `</div>`;

    cat.optionGroups.forEach(og => {
      html += `<div class="opt-group"><div class="opt-group-label">${og.name}</div>`;
      og.choices.forEach(c => {
        html += `<label class="opt-label"><input type="${og.type}" name="${og.id}" value="${c.id}" data-price="${c.price}" data-name="${c.name}" onchange="updateTotal()"> ${c.name} ${c.price > 0 ? `<span class="price-hint">+$${c.price.toFixed(2)}</span>` : ''}</label>`;
      });
      html += `</div>`;
    });

    document.getElementById('dynamic-menu').innerHTML = html;
    updateTotal();
  }

  function updateTotal() {
    let total = 0;
    let summaryHtml = '';
    
    const drinkEl = document.querySelector('input[name="drink"]:checked');
    if (drinkEl) {
      total += parseFloat(drinkEl.dataset.price);
      summaryHtml += `<div>Drink: $${parseFloat(drinkEl.dataset.price).toFixed(2)}</div>`;
    }

    const cat = menuData.categories[activeCategoryIndex];
    cat.optionGroups.forEach(og => {
      document.querySelectorAll(`input[name="${og.id}"]:checked`).forEach(el => {
        total += parseFloat(el.dataset.price);
        summaryHtml += `<div>+ ${el.dataset.name}: $${parseFloat(el.dataset.price).toFixed(2)}</div>`;
      });
    });

    const qty = Math.max(1, parseInt(document.getElementById('cust-qty').value) || 1);
    total = total * qty;

    document.getElementById('summary-content').innerHTML = summaryHtml || 'Select a drink to begin.';
    document.getElementById('summary-total').textContent = total.toFixed(2);
  }

  document.getElementById('cust-qty').addEventListener('input', updateTotal);

  async function submitOrder() {
    const drinkEl = document.querySelector('input[name="drink"]:checked');
    if (!drinkEl) return alert('Please select a drink');
    
    const cat = menuData.categories[activeCategoryIndex];
    const drinkName = cat.drinks.find(d => d.id === drinkEl.value).name;
    const selectedOptions = [];

    cat.optionGroups.forEach(og => {
      document.querySelectorAll(`input[name="${og.id}"]:checked`).forEach(el => {
        selectedOptions.push(el.dataset.name);
      });
    });

    const payload = {
      name: document.getElementById('cust-name').value,
      email: document.getElementById('cust-email').value,
      room: document.getElementById('cust-room').value,
      notes: document.getElementById('cust-notes').value,
      category: cat.name,
      drink: drinkName,
      options: selectedOptions,
      quantity: Math.max(1, parseInt(document.getElementById('cust-qty').value) || 1),
      total: parseFloat(document.getElementById('summary-total').textContent)
    };

    if (!payload.name || !payload.email || !payload.room) return alert('Fill required fields');

    const res = await fetch('/api/order', { method: 'POST', body: JSON.stringify(payload) });
    if (res.ok) {
      alert('Order placed successfully!');
      window.location.reload();
    } else {
      alert('Error placing order');
    }
  }

  loadMenu();
</script>
</body>
</html>
